name: UI Tests

on: workflow_dispatch

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Checkout (copy) gh-pages repository to GitHub runner
        uses: actions/checkout@v2
        with:
          ref: gh-pages
          path: ./.github/gh-pages

      - name: Run UI-tests via docker-compose
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          docker compose up --exit-code-from regression || true
          
      - name: Copy Allure history
        run: |
          # Создаем папку, куда будем копировать
          sudo mkdir -p allure-results/history
          
          # Проверяем: если папка существует И она не пустая
          if [ -d "./.github/gh-pages/history" ] && [ "$(ls -A ./.github/gh-pages/history)" ]; then
            sudo cp -R ./.github/gh-pages/history/* allure-results/history/
            echo "История Allure успешно скопирована."
          else
            echo "История не найдена или пуста, пропускаем этот шаг."
          fi

      - name: Generate Allure report
        run: |
          sudo docker compose run regression /bin/sh -c "allure generate allure-results --clean -o allure-report"

      - name: Update Allure history
        run: |
          # Сначала создаем папку-назначение, чтобы cp не ругался
          sudo mkdir -p ./.github/gh-pages/history/
          # Копируем историю из нового отчета в папку для деплоя
          sudo cp -R allure-report/history/* ./.github/gh-pages/history/ || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: true